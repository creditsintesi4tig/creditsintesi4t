    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
        }

        /* Corporate identity color tokens */
        :root {
            --color-primary: #00a0e4;
            --color-secondary: #48626f;
            --color-bg-light: #f0f9ff;
        }

        .text-brand-primary { color: var(--color-primary); }
        .bg-brand-primary { background-color: var(--color-primary); }
        .border-brand-primary { border-color: var(--color-primary); }
        
        .text-brand-secondary { color: var(--color-secondary); }
        .bg-brand-secondary { background-color: var(--color-secondary); }
        .border-brand-secondary { border-color: var(--color-secondary); }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 160, 228, 0.15);
            border-radius: 1rem;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 350px;
        }

        .traffic-light {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-block;
        }

        .step-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px -5px rgba(0, 160, 228, 0.15);
            border-color: rgba(0, 160, 228, 0.4);
        }

        /* Custom scrollbar matching brand colors */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--color-primary);
            border-radius: 10px;
        }

        /* Pulsing light indicator for AI assistant status */
        .pulse-light {
            box-shadow: 0 0 0 0 rgba(0, 160, 228, 0.7);
            animation: pulse 2.5s infinite;
        }
        @keyframes pulse {
            0 {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 160, 228, 0.7);
            }
            70% {
                transform: scale(1);
                box-shadow: 0 0 0 10px rgba(0, 160, 228, 0);
            }
            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(0, 160, 228, 0);
            }
        }
    </style>
